[pytest]
# Configuration pytest SIMPLE pour débutants

# Répertoires de test
testpaths = test

# Motifs de recherche des fichiers de test
python_files = test_*.py

# Motifs de recherche des classes de test
python_classes = Test*

# Motifs de recherche des fonctions de test
python_functions = test_*

# Options d'affichage basiques
addopts =
    -v
    --tb=short

# Markers personnalisés
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
